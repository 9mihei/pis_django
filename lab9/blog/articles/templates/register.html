<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="/static/css/article.css">
</head>
<body class="article">
    <div class="header">
        <img src="/static/img/dpb-logo.png" />
        <a href="/">Все записи</a>
    </div>
    <div class="content">
        <h1>Регистрация</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="username" placeholder="Имя пользователя" value="{{ form.username }}" class="form-control">
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" value="{{ form.email }}" class="form-control">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Пароль" class="form-control">
            </div>
            <div class="form-group">
                <input type="password" name="password2" placeholder="Подтверждение пароля" class="form-control">
            </div>
            <div class="form-group">
                <input type="submit" value="Зарегистрироваться" class="btn">
            </div>
            {% if form.errors %}
                <div class="error">{{ form.errors }}</div>
            {% endif %}
        </form>
    </div>
</body>
</html>
